name: Sync cart bookings to Appointments

# Reads PAID cart orders carrying an SDBK1 booking string on a sale.order.line,
# creates the matching calendar.event on the right detailer's calendar (mirroring
# event id 2), fires the native "Appointment Booked" email (mail.template 37) +
# reminders, and marks each line idempotently so it is never reprocessed.
#
# Runs OUTSIDE Odoo over XML-RPC -> ZERO billable Odoo LoC (Rule 9).
#
# SAFETY GATE (review fix): a SCHEDULED run only commits when the repo variable
# SYNC_BOOKINGS_ENABLED == 'true'. This means merging/landing this workflow does
# NOTHING live until the owner explicitly turns it on
# (Settings -> Secrets and variables -> Actions -> Variables -> New variable
#  SYNC_BOOKINGS_ENABLED = true). Until then scheduled runs go DRY-RUN only.
# Manual workflow_dispatch always honours its own commit input regardless.
#
# Cadence: every 15 min inside the UTC band covering NZ business hours (both
# NZST=UTC+12 and NZDT=UTC+13). The in-job Pacific/Auckland gate narrows to
# 07:00-21:00 NZ so DST never matters.
on:
  schedule:
    - cron: "*/15 0-9,18-23 * * *"
  # EVENT-DRIVEN: an Odoo automation -> webhook -> Apps Script relay POSTs a
  # repository_dispatch here the moment a customer checks out, so the booking reserves
  # its slot within seconds (not up to 15 min later). Commits only when SYNC_BOOKINGS_ENABLED
  # == 'true' (same gate as scheduled); bypasses the NZ-hours gate so it always runs.
  repository_dispatch:
    types: [booking-created]
  workflow_dispatch:
    inputs:
      order_id:
        description: "Restrict to one order (name S00088 or numeric id). Blank = all eligible."
        required: false
        default: ""
      commit:
        description: "Actually create events + send email?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      no_email:
        description: "Create events but do NOT send template 37 (safe testing)"
        type: choice
        options: ["no", "yes"]
        default: "no"
      with_sms:
        description: "Also schedule the SMS reminder (alarm 8, burns IAP credits)"
        type: choice
        options: ["no", "yes"]
        default: "no"
      include_past:
        description: "Backfill past-dated bookings (event only, no email/sms)"
        type: choice
        options: ["no", "yes"]
        default: "no"
      include_sent:
        description: "Also act on UNPAID 'sent' quotations (NOT recommended)"
        type: choice
        options: ["no", "yes"]
        default: "no"

concurrency:
  group: sync-bookings         # single instance; a new run never overlaps a slow one
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Gate to NZ hours (07:00-21:00 Pacific/Auckland)
        id: gate
        run: |
          H=$(TZ='Pacific/Auckland' date +%H)
          echo "NZ hour = $H"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "manual/event-driven run -- bypassing NZ gate"; echo "run=yes" >> "$GITHUB_OUTPUT"
          elif [ "$H" -lt 7 ] || [ "$H" -ge 21 ]; then
            echo "outside window -- no-op"; echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Write .env from secrets
        if: steps.gate.outputs.run == 'yes'
        run: |
          cat > .env <<EOF
          ODOO_URL=${{ secrets.ODOO_URL }}
          ODOO_DB=${{ secrets.ODOO_DB }}
          ODOO_USER=${{ secrets.ODOO_USER }}
          ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}
          EOF

      - name: Build flags
        if: steps.gate.outputs.run == 'yes'
        id: flags
        env:
          SYNC_ENABLED: ${{ vars.SYNC_BOOKINGS_ENABLED }}
        run: |
          FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Scheduled + event-driven runs commit ONLY when the owner flipped the enable flag.
            if [ "$SYNC_ENABLED" = "true" ]; then
              FLAGS="--commit --max 20"     # throttle any surprise backlog under the email cap
            else
              echo "SYNC_BOOKINGS_ENABLED != true -> DRY-RUN only"
            fi
          else
            # Manual dispatch honours its own inputs.
            if [ "${{ github.event.inputs.commit }}" = "yes" ]; then FLAGS="--commit"; fi
            if [ "${{ github.event.inputs.no_email }}" = "yes" ]; then FLAGS="$FLAGS --no-email"; fi
            if [ "${{ github.event.inputs.with_sms }}" = "yes" ]; then FLAGS="$FLAGS --with-sms"; fi
            if [ "${{ github.event.inputs.include_past }}" = "yes" ]; then FLAGS="$FLAGS --include-past"; fi
            if [ "${{ github.event.inputs.include_sent }}" = "yes" ]; then FLAGS="$FLAGS --include-sent"; fi
            if [ -n "${{ github.event.inputs.order_id }}" ]; then FLAGS="$FLAGS --only-order ${{ github.event.inputs.order_id }}"; fi
          fi
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "resolved flags: '$FLAGS'"

      - name: Sync bookings
        if: steps.gate.outputs.run == 'yes'
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python sync_bookings.py ${{ steps.flags.outputs.flags }} --verbose

      - name: Upload run log
        if: steps.gate.outputs.run == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: sync-bookings-log
          path: logs/*.csv
          if-no-files-found: ignore
