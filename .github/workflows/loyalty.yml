name: Loyalty maintenance

# Replaces Odoo cron 62 (every 10 min) / server action #760. Loyalty expiry +
# membership credits are a daily batch — no need for sub-hour cadence.
on:
  schedule:
    - cron: "0 13 * * *"    # 13:00 UTC = ~01:00-02:00 NZ (off-peak); time not critical
  workflow_dispatch: {}

concurrency:
  group: loyalty
  cancel-in-progress: false

jobs:
  loyalty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run loyalty maintenance
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python loyalty_maintenance_external.py --verbose
